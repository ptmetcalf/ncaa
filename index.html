<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NCAA Pool Live Draft Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./favicon.svg?v=20260312b" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=20260312ah" />
  </head>
  <body>
    <div class="ambient"></div>
    <main class="layout">
      <pool-page-hero
        title="Live Draft Board"
        active-page="home"
        meta-id="meta-line"
        action-id="refresh-toggle"
        action-label="Pause Refresh"
        action-placement="bottom-right"
        refresh
      ></pool-page-hero>

      <pool-card-section title="Live Pick Status" copy-id="live-status-sub" copy="Waiting for draft data...">
        <pool-status-grid>
          <article class="status-tile">
            <h3>Current Pick</h3>
            <p id="status-pick">Waiting</p>
          </article>
          <article class="status-tile">
            <h3>On The Clock</h3>
            <p id="status-on-clock">No order set</p>
          </article>
          <article class="status-tile">
            <h3>Latest Pick</h3>
            <p id="status-latest">No picks yet</p>
          </article>
          <article class="status-tile">
            <h3>Available Players</h3>
            <p id="status-available">Waiting</p>
          </article>
        </pool-status-grid>
      </pool-card-section>

      <pool-card-section class="draft-order-card" title="Draft Order">
        <div id="draft-order-meta" class="draft-order-highlights" aria-live="polite"></div>
        <pool-table-wrap class="tall mobile-card-wrap draft-order-table-wrap">
          <table class="mobile-cards draft-order-table">
            <thead>
              <tr>
                <th>Spot</th>
                <th>Owner</th>
                <th>Draft Status</th>
              </tr>
            </thead>
            <tbody id="draft-order-body"></tbody>
          </table>
        </pool-table-wrap>
      </pool-card-section>

      <pool-collapsible-card card class="context-collapsible" summary="Tournament Context (Optional)" content-class="context-content">
        <section class="context-bracket">
          <pool-section-head title="Live Bracket" copy-id="bracket-summary" copy="Loading bracket..."></pool-section-head>
          <pool-table-wrap class="tall">
            <table>
              <thead>
                <tr>
                  <th>Round</th>
                  <th>Region</th>
                  <th>Matchup</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="bracket-body"></tbody>
            </table>
          </pool-table-wrap>
        </section>
      </pool-collapsible-card>

      <pool-card-section title="Players">
        <pool-table-workspace>
          <section data-workspace-controls class="controls readonly-controls public-sticky-controls">
          <div class="controls-row readonly-controls-row">
            <label>
              Sort Order
              <select id="sort-mode">
                <option value="seed_then_team">Seed then Team</option>
                <option value="team_then_seed">Team then Seed</option>
                <option value="seed_only">Seed only</option>
                <option value="team_only">Team only</option>
              </select>
            </label>
            <label>
              Seed Direction
              <select id="seed-direction">
                <option value="asc">1 to 16</option>
                <option value="desc">16 to 1</option>
              </select>
            </label>
            <label>
              Player Status
              <select id="player-status">
                <option value="eligible">Eligible</option>
                <option value="picked">Picked</option>
                <option value="all">All</option>
              </select>
            </label>
            <label>
              Team
              <input id="team-query" type="search" placeholder="Team name" />
            </label>
            <label>
              Player
              <input id="player-query" type="search" placeholder="Player name" />
            </label>
            <button id="reset-filters" type="button" class="readonly-reset-btn">Reset Filters</button>
          </div>
          <div class="controls-row compact readonly-controls-actions">
            <p id="filter-summary" class="filter-summary"></p>
          </div>
          </section>
          <pool-table-wrap data-workspace-table class="board-scroll mobile-card-wrap">
            <table class="mobile-cards">
              <thead>
                <tr>
                  <th>Player</th>
                  <th>Team</th>
                  <th>Region</th>
                  <th>Seed</th>
                  <th>Draft Status</th>
                </tr>
              </thead>
              <tbody id="board-body"></tbody>
            </table>
          </pool-table-wrap>
        </pool-table-workspace>
      </pool-card-section>
    </main>

    <script type="module" src="shared-components.js?v=20260312i"></script>
    <script type="module" src="public-home.js?v=20260406k"></script>
  </body>
</html>
