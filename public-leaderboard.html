<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NCAA Pool Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./favicon.svg?v=20260312b" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=20260312ah" />
  </head>
  <body>
    <div class="ambient"></div>
    <main class="layout">
      <pool-page-hero
        title="Live Leaderboard"
        active-page="leaderboard"
        meta-id="meta-line"
        action-id="refresh-toggle"
        action-label="Pause Refresh"
        action-placement="bottom-right"
        refresh
      ></pool-page-hero>

      <pool-two-col-section class="leaderboard-layout">
        <div>
          <pool-section-head title="Leaderboard" copy-id="leaderboard-hint" copy="Click an owner row to filter player details."></pool-section-head>
          <pool-table-wrap class="tall mobile-card-wrap">
            <table class="mobile-cards pick-details-table">
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Owner</th>
                  <th>Players</th>
                  <th>Remaining</th>
                  <th>Total PTS</th>
                </tr>
              </thead>
              <tbody id="leaderboard-body"></tbody>
            </table>
          </pool-table-wrap>
        </div>

        <div>
          <pool-section-head-actions title="Pick Details">
            <p id="detail-summary">Loading...</p>
            <button id="detail-clear-owner" type="button" hidden>Show All Owners</button>
          </pool-section-head-actions>
          <pool-table-wrap class="tall mobile-card-wrap">
            <table class="mobile-cards">
              <thead>
                <tr>
                  <th>Owner</th>
                  <th>Player</th>
                  <th>Team</th>
                  <th>Seed</th>
                  <th>Status</th>
                  <th>Tourn PTS</th>
                  <th>Tourn GP</th>
                </tr>
              </thead>
              <tbody id="detail-body"></tbody>
            </table>
          </pool-table-wrap>
        </div>
      </pool-two-col-section>

      <pool-card-section title="Live Bracket" copy-id="bracket-summary" copy="Loading bracket...">
        <pool-table-wrap class="tall">
          <table>
            <thead>
              <tr>
                <th>Round</th>
                <th>Region</th>
                <th>Matchup</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="bracket-body"></tbody>
          </table>
        </pool-table-wrap>
      </pool-card-section>
    </main>

    <script type="module" src="shared-components.js?v=20260312i"></script>
    <script type="module" src="public-leaderboard.js?v=202604062230"></script>
  </body>
</html>
